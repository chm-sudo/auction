<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>豪華拍賣行 - 絕對不捲動版</title>
    <style>
        :root {
            --velvet: #800020;
            --gold: #FFD700;
            --wood: #5C4033;
            --paper: #FDF5E6;
        }

        /* 強制鎖定視窗，禁止捲動 */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: var(--paper);
            font-family: "PingFang HK", sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ---------------- Setup ---------------- */
        #setup-screen {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .setup-box {
            width: 80%; max-width: 400px; padding: 30px;
            border: 5px solid var(--gold); border-radius: 20px; text-align: center;
        }

        /* ---------------- 上方題目區 (佔 25%) ---------------- */
        #top-panel {
            height: 25vh;
            background: linear-gradient(to bottom, var(--velvet), #4a0012);
            color: white; border-bottom: 4px solid var(--gold);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 20px; box-sizing: border-box; text-align: center;
        }
        #q-text { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; overflow: hidden; }
        #q-ans { font-size: 1.3rem; color: var(--gold); display: none; }

        /* ---------------- 中間計分區 (核心自適應：佔 65%) ---------------- */
        #game-screen {
            height: 65vh;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
        }
        
        #participants-grid {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 8px; /* 縮小間距以節省空間 */
        }

        .card {
            background: white; border: 2px solid var(--wood); border-radius: 10px;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 4px; box-sizing: border-box; overflow: hidden;
        }
        .card-name { font-weight: bold; color: var(--wood); text-align: center; border-bottom: 1px solid #eee; }
        .card-coins { font-weight: bold; color: var(--velvet); text-align: center; display: flex; align-items: center; justify-content: center; gap: 3px; }
        
        .btn-row { display: flex; gap: 3px; height: 35%; }
        .btn-action { flex: 1; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-plus { background: #E8F5E9; color: #2E7D32; font-size: 0.9rem; }
        .btn-minus { background: var(--velvet); color: white; width: 100%; height: 30%; font-size: 0.8rem; margin-top: 2px; }

        /* ---------------- 底部工具列 (佔 10%) ---------------- */
        footer {
            height: 10vh;
            background: #ddd; border-top: 2px solid #bbb;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box;
        }
        
        .btn-main { padding: 10px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-gold { background: var(--gold); color: var(--wood); }
        .btn-next { background: var(--velvet); color: white; }
        .btn-end { background: #333; color: white; }

        /* ---------------- 結算畫面 ---------------- */
        #summary-screen {
            position: fixed; inset: 0; background: var(--paper); z-index: 9999;
            display: none; padding: 20px; overflow-y: auto;
        }
        .sec { margin-bottom: 20px; padding: 15px; background: white; border-radius: 10px; border: 2px solid var(--gold); }
        .rank-item { font-size: 1.4rem; border-bottom: 1px dashed #ccc; padding: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-box">
        <h1 style="color:var(--velvet); font-size: 2rem;">拍賣行控制台</h1>
        <div style="margin: 20px 0; text-align: left; font-size: 1.2rem;">
            <p>模式：
                <button onclick="setMode('group')" id="m1" class="btn-main" style="padding:5px 15px">分組</button>
                <button onclick="setMode('individual')" id="m2" class="btn-main btn-gold" style="padding:5px 15px">個人</button>
            </p>
            <p>數量：<input type="number" id="count-in" value="6" style="width:60px"></p>
            <p>初始金幣：<input type="number" id="coin-in" value="10" style="width:60px"></p>
            <p><label><input type="checkbox" id="q-toggle" checked> 顯示題目區域</label></p>
        </div>
        <button class="btn-main btn-next" style="width:100%; padding: 15px;" onclick="initGame()">進入拍賣大廳</button>
    </div>
</div>

<div id="top-panel">
    <div id="q-text">請準備開始...</div>
    <div id="q-ans"></div>
    <div style="margin-top: 10px;">
        <button class="btn-main btn-gold" style="font-size:0.9rem; padding: 5px 15px;" onclick="showAns()">公佈答案</button>
    </div>
</div>

<div id="game-screen">
    <div id="participants-grid"></div>
</div>

<footer>
    <button class="btn-main btn-end" onclick="endGame()">結束結算</button>
    <div id="q-num" style="font-size:1.2rem; font-weight:bold; color:var(--velvet)">題目 0/17</div>
    <button class="btn-main btn-next" onclick="nextQ()">下一題</button>
</footer>

<div id="summary-screen">
    <div style="max-width: 700px; margin: 0 auto;">
        <h1 style="text-align:center; color:var(--velvet);">拍賣結算</h1>
        <div class="sec"><h2>🏆 前三名</h2><div id="res-top"></div></div>
        <div class="sec"><h2>⚖️ 佛系名單 (無變動)</h2><div id="res-stay" style="font-size: 1.2rem;"></div></div>
        <div class="sec"><h2>💸 破產名單</h2><div id="res-broke" style="font-size: 1.2rem; color: red;"></div></div>
        <div class="sec"><h2>📜 回答紀錄</h2><div id="res-qs" style="font-size: 0.9rem; max-height: 200px; overflow-y: scroll;"></div></div>
        <button class="btn-main btn-next" style="width:100%" onclick="location.reload()">重新開始</button>
    </div>
</div>

<script>
    let participants = [];
    let startCoins = 10;
    let mode = 'individual';
    let currentQ = -1;
    let usedQs = [];

    const db = [
        { q: "「老師，我想去洗手間，我好急。」", a: "贗品。糾正：應說「我憋不住了」。" },
        { q: "「這件衣服質量很好，但是價格有點貴。」", a: "真品（正確）。" },
        { q: "「你先走，我走多一陣就來。」", a: "贗品。糾正：應說「我再走一會兒就來」。" },
        { q: "「這個計畫（jì huà）非常完美。」", a: "真品（正確）。" },
        { q: "「請大家保持安靜（ān jìng）。」", a: "真品（正確）。" },
        { q: "「這部手機質量很好。」", a: "真品（正確）。" },
        { q: "「他在學校門口等緊你。」", a: "贗品。糾正：應說「他在學校門口等著你呢」。" },
        { q: "粵：「你有冇搞錯呀？」→ 譯：「你有沒有弄錯？」", a: "贗品。地道翻譯：「你沒事吧？」" },
        { q: "粵：「我行開一陣。」→ 譯：「我走開一會兒。」", a: "贗品。地道翻譯：「我離開一下。」" },
        { q: "粵：「佢呢個人好錫老婆。」→ 譯：「他這個人很疼老婆。」", a: "真品（正確）。" },
        { q: "粵：「你唔好亂噏啦！」→ 譯：「你不要亂吸啊！」", a: "贗品。地道翻譯：「你別瞎說！」" },
        { q: "粵：「真係大整蠱！」→ 譯：「真是太坑人了！」", a: "真品（正確地道）。" },
        { q: "粵：「大家咁話。」→ 譯：「大家都這麼說。」", a: "贗品。地道翻譯：「彼此彼此」。" },
        { q: "粵：「佢份人好生性。」→ 譯：「他這個人很懂事。」", a: "贗品。譯：很懂事。" },
        { q: "粵：「你唔好『水』我喎！」→ 譯：「你別忽悠我啊！」", a: "真品（正確）。" },
        { q: "粵：「今次真係『大鑊』喇！」→ 譯：「這次真的是大鍋了！」", a: "贗品。譯：這下糟了。" },
        { q: "粵：「佢講嘢好『骨』。」→ 譯：「他說話很硬。」", a: "贗品。譯：說話帶刺。" }
    ].sort(() => Math.random() - 0.5);

    function setMode(m) {
        mode = m;
        document.getElementById('m1').className = m === 'group' ? 'btn-main btn-gold' : 'btn-main';
        document.getElementById('m2').className = m === 'individual' ? 'btn-main btn-gold' : 'btn-main';
    }

    function initGame() {
        const count = parseInt(document.getElementById('count-in').value);
        startCoins = parseInt(document.getElementById('coin-in').value);
        for(let i=1; i<=count; i++) participants.push({ id: i, coins: startCoins });

        if(!document.getElementById('q-toggle').checked) {
            document.getElementById('top-panel').style.display = 'none';
            document.getElementById('game-screen').style.height = '90vh';
        }

        document.getElementById('setup-screen').style.display = 'none';
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('participants-grid');
        grid.innerHTML = '';
        const n = participants.length;
        
        // 根據人數動態決定行列
        let cols, rows;
        if (n <= 6) { cols = 3; rows = 2; }
        else if (n <= 12) { cols = 4; rows = 3; }
        else if (n <= 20) { cols = 5; rows = 4; }
        else if (n <= 30) { cols = 6; rows = 5; }
        else { cols = 8; rows = Math.ceil(n/8); }

        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        // 動態計算字體大小
        let nameSize = n > 20 ? "0.8rem" : "1.2rem";
        let coinSize = n > 20 ? "1.2rem" : "2.2rem";

        participants.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-name" style="font-size:${nameSize}">${mode === 'group' ? '第'+p.id+'組' : p.id+'號'}</div>
                <div class="card-coins" style="font-size:${coinSize}">💰${p.coins}</div>
                <div style="flex:1; display:flex; flex-direction:column; justify-content:flex-end;">
                    <div class="btn-row">
                        <button class="btn-action btn-plus" onclick="mod(${idx}, 5)">+5</button>
                        <button class="btn-action btn-plus" onclick="mod(${idx}, 10)">+10</button>
                    </div>
                    <button class="btn-action btn-minus" onclick="mod(${idx}, -1)">-1</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function mod(idx, val) {
        participants[idx].coins += val;
        renderGrid();
    }

    function nextQ() {
        currentQ++;
        if(currentQ < db.length) {
            document.getElementById('q-text').innerText = db[currentQ].q;
            document.getElementById('q-ans').style.display = 'none';
            document.getElementById('q-num').innerText = `題目: ${currentQ + 1} / ${db.length}`;
            usedQs.push(db[currentQ]);
        }
    }

    function showAns() {
        if(currentQ >= 0) {
            document.getElementById('q-ans').innerText = db[currentQ].a;
            document.getElementById('q-ans').style.display = 'block';
        }
    }

    function endGame() {
        document.getElementById('summary-screen').style.display = 'block';
        let sorted = [...participants].sort((a,b) => b.coins - a.coins);
        
        document.getElementById('res-top').innerHTML = sorted.slice(0, 3).map((p, i) => 
            `<div class="rank-item"><span>${i+1}. ${mode==='group'?'組別':'編號'} ${p.id}</span> <span>💰 ${p.coins}</span></div>`).join('');

        let stay = participants.filter(p => p.coins === startCoins).map(p => p.id);
        document.getElementById('res-stay').innerText = stay.length ? stay.join(', ') : '無';

        let broke = participants.filter(p => p.coins <= 0).map(p => p.id);
        document.getElementById('res-broke').innerText = broke.length ? broke.join(', ') : '無';

        document.getElementById('res-qs').innerHTML = usedQs.map((it, i) => `${i+1}. ${it.q}<br>👉 ${it.a}`).join('<hr>');
    }
</script>
</body>
</html>
